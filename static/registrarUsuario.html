<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>AlkyWallet - Registro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- SweetAlert2 CDN -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
          font-family: 'Inter', sans-serif;
        }

        .gradient-bg {
          background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .glass-effect {
          background: rgba(255, 255, 255, 0.95);
          backdrop-filter: blur(20px);
          border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .floating-animation {
          animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
          0%, 100% { transform: translateY(0px); }
          50% { transform: translateY(-10px); }
        }

        .pulse-shadow {
          box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7);
          transition: all 0.3s ease;
        }

        .pulse-shadow:hover {
          box-shadow: 0 0 0 10px rgba(59, 130, 246, 0);
        }

        .input-focus {
          transition: all 0.3s ease;
        }

        .input-focus:focus {
          transform: translateY(-2px);
          box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body class="gradient-bg min-h-screen flex flex-col">
<!-- Header -->
<header class="glass-effect shadow-lg border-b border-white/20">
    <div class="container mx-auto px-4 py-4">
        <div class="flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <div class="bg-gradient-to-r from-blue-500 to-purple-600 p-2 rounded-xl floating-animation">
                    <span class="material-icons text-white text-2xl">account_balance_wallet</span>
                </div>
                <div>
                    <h1 class="text-xl font-bold bg-gradient-to-r from-blue-600 to-purple-600 bg-clip-text text-transparent">
                        AlkyWallet
                    </h1>
                    <p class="text-xs text-gray-600">Tu billetera digital</p>
                </div>
            </div>

            <!-- Indicador de estado -->
            <div class="hidden sm:flex items-center space-x-2 text-sm text-gray-600">
                <span class="material-icons text-green-500 text-sm">security</span>
                <span>Conexión segura</span>
            </div>
        </div>
    </div>
</header>

<!-- Main Content -->
<main class="flex-1 flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <!-- Decoración superior -->
        <div class="text-center mb-8">
            <div class="relative inline-block">
                <div class="absolute inset-0 bg-gradient-to-r from-blue-400 to-purple-500 rounded-full blur-xl opacity-30 animate-pulse"></div>
                <div class="relative bg-gradient-to-r from-blue-500 to-purple-600 p-4 rounded-2xl floating-animation">
                    <span class="material-icons text-white text-4xl">account_balance_wallet</span>
                </div>
            </div>
            <h2 class="text-3xl font-bold text-white mt-4 mb-2">¡Regístrate!</h2>
            <p class="text-blue-100">Crea tu cuenta en tu billetera digital</p>
        </div>

        <!-- Formulario de Registro -->
        <div class="glass-effect rounded-3xl p-8 shadow-2xl">
            <form id="registerForm" class="space-y-6">
                <!-- Campo Nombre -->
                <div class="space-y-2">
                    <label for="nombre" class="flex items-center text-sm font-medium text-gray-700">
                        <span class="material-icons text-blue-500 mr-2 text-sm">person</span>
                        Nombre
                    </label>
                    <div class="relative">
                        <input
                                type="text"
                                id="nombre"
                                placeholder="Tu nombre"
                                required
                                class="input-focus w-full p-4 pl-12 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all duration-300"
                        >
                    </div>
                </div>

                <!-- Campo Apellido -->
                <div class="space-y-2">
                    <label for="apellido" class="flex items-center text-sm font-medium text-gray-700">
                        <span class="material-icons text-blue-500 mr-2 text-sm">person</span>
                        Apellido
                    </label>
                    <div class="relative">
                        <input
                                type="text"
                                id="apellido"
                                placeholder="Tu apellido"
                                required
                                class="input-focus w-full p-4 pl-12 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all duration-300"
                        >
                    </div>
                </div>

                <!-- Campo Email -->
                <div class="space-y-2">
                    <label for="email" class="flex items-center text-sm font-medium text-gray-700">
                        <span class="material-icons text-blue-500 mr-2 text-sm">email</span>
                        Correo electrónico
                    </label>
                    <div class="relative">
                        <input
                                type="email"
                                id="email"
                                placeholder="ejemplo@mail.com"
                                required
                                class="input-focus w-full p-4 pl-12 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all duration-300"
                        >
                    </div>
                </div>

                <!-- Campo Contraseña -->
                <div class="space-y-2">
                    <label for="password" class="flex items-center text-sm font-medium text-gray-700">
                        <span class="material-icons text-blue-500 mr-2 text-sm">lock</span>
                        Contraseña
                    </label>
                    <div class="relative">
                        <input
                                type="password"
                                id="password"
                                placeholder="Tu contraseña"
                                required
                                class="input-focus w-full p-4 pl-12 pr-12 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all duration-300"
                        >
                        <span class="material-icons absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400">
                                key
                            </span>
                        <button
                                type="button"
                                id="togglePassword"
                                class="absolute right-4 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-gray-600 transition-colors"
                        >
                            <span class="material-icons text-sm">visibility</span>
                        </button>
                    </div>
                </div>

                <!-- Botón de Registro -->
                <button
                        type="submit"
                        class="pulse-shadow w-full bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-700 hover:to-purple-700 text-white py-4 rounded-xl font-semibold transition-all duration-300 transform hover:scale-105 flex items-center justify-center space-x-2"
                >
                    <span class="material-icons">person_add</span>
                    <span>Registrar</span>
                </button>

                <!-- Link de inicio de sesión -->
                <div class="mt-6 text-center">
                    <p class="text-sm text-gray-600">
                        ¿Ya tienes cuenta?
                        <a href="index.html" class="text-blue-600 hover:text-blue-700 font-medium transition-colors">
                            Inicia sesión aquí
                        </a>
                    </p>
                </div>
            </form>
        </div>

        <!-- Footer info -->
        <div class="mt-8 text-center">
            <div class="flex items-center justify-center space-x-4 text-sm text-blue-100">
                <div class="flex items-center">
                    <span class="material-icons text-sm mr-1">shield</span>
                    <span>Seguro</span>
                </div>
                <div class="flex items-center">
                    <span class="material-icons text-sm mr-1">speed</span>
                    <span>Rápido</span>
                </div>
                <div class="flex items-center">
                    <span class="material-icons text-sm mr-1">support_agent</span>
                    <span>Soporte 24/7</span>
                </div>
            </div>
        </div>
    </div>
</main>

<!-- Script index/register.js -->
<script src="./js/registrar.js"></script>
<script src="./js/auth.js"></script>
</body>
</html>
