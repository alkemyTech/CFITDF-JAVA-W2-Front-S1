<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>AlkyWallet - Modificación de Usuario</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- SweetAlert2 CDN -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .glass-effect {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .input-focus {
            transition: all 0.3s ease;
            padding: 12px; /* Reducir padding */
            font-size: 0.9rem; /* Reducir tamaño de fuente */
        }

        .space-y-2 {
            margin-bottom: 0.5rem; /* Reducir espacio entre campos */
        }

        .pulse-shadow {
            box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7);
            transition: all 0.3s ease;
        }

        .pulse-shadow:hover {
            box-shadow: 0 0 0 10px rgba(59, 130, 246, 0);
        }

        .rounded-3xl {
            border-radius: 1rem; /* Ajustar bordes */
        }

        .field-row {
            display: flex;
            justify-content: space-between;
            gap: 10px; /* Espacio entre los campos */
        }

        .field-row > div {
            flex: 1; /* Cada campo ocupa el 50% del ancho */
        }

        .form-container {
            max-width: 800px; /* Aumentar el ancho máximo */
            width: 100%; /* Asegurar que el ancho sea del 100% */
        }
    </style>
</head>
<body class="gradient-bg min-h-screen flex flex-col">
<header class="glass-effect shadow-lg border-b border-white/20">
    <div class="container mx-auto px-4 py-4">
        <div class="flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <div class="bg-gradient-to-r from-blue-500 to-purple-600 p-2 rounded-xl floating-animation">
                    <span class="material-icons text-white text-2xl">account_balance_wallet</span>
                </div>
                <div>
                    <h1 class="text-xl font-bold bg-gradient-to-r from-blue-600 to-purple-600 bg-clip-text text-transparent">
                        AlkyWallet
                    </h1>
                    <p class="text-xs text-gray-600">Tu billetera digital</p>
                </div>
            </div>

            <div class="hidden sm:flex items-center space-x-2 text-sm text-gray-600">
                <span class="material-icons text-green-500 text-sm">security</span>
                <span>Conexión segura</span>
            </div>
        </div>
    </div>
</header>

<main class="flex-1 flex items-center justify-center p-4">
    <div class="form-container w-full">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-bold text-white mt-4 mb-2">¡Modificar Usuario!</h2>
            <p class="text-blue-100">Modifica tu cuenta en tu billetera digital</p>
        </div>

        <div class="glass-effect rounded-3xl p-8 shadow-2xl">
            <form id="userForm" class="space-y-6">
                <input type="hidden" id="userId" value=""> <!-- Campo oculto para el ID del usuario -->

                <!-- Fila Nombre y Apellido -->
                <div class="field-row">
                    <div class="space-y-2">
                        <label for="nombre" class="flex items-center text-sm font-medium text-gray-700">
                            <span class="material-icons text-blue-500 mr-2 text-sm">person</span>
                            Nombre
                        </label>
                        <input type="text" id="nombre" placeholder="Tu nombre" required class="input-focus w-full border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div class="space-y-2">
                        <label for="apellido" class="flex items-center text-sm font-medium text-gray-700">
                            <span class="material-icons text-blue-500 mr-2 text-sm">person</span>
                            Apellido
                        </label>
                        <input type="text" id="apellido" placeholder="Tu apellido" required class="input-focus w-full border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                </div>

                <!-- Fila Email y DNI -->
                <div class="field-row">
                    <div class="space-y-2">
                        <label for="email" class="flex items-center text-sm font-medium text-gray-700">
                            <span class="material-icons text-blue-500 mr-2 text-sm">email</span>
                            Correo electrónico
                        </label>
                        <input type="email" id="email" placeholder="ejemplo@mail.com" required class="input-focus w-full border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div class="space-y-2">
                        <label for="dni" class="flex items-center text-sm font-medium text-gray-700">
                            <span class="material-icons text-blue-500 mr-2 text-sm">badge</span>
                            DNI
                        </label>
                        <input type="text" id="dni" placeholder="Tu DNI" required class="input-focus w-full border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                </div>

                <!-- Fila Teléfono y Fecha de Nacimiento -->
                <div class="field-row">
                    <div class="space-y-2">
                        <label for="telefono" class="flex items-center text-sm font-medium text-gray-700">
                            <span class="material-icons text-blue-500 mr-2 text-sm">phone</span>
                            Teléfono
                        </label>
                        <input type="tel" id="telefono" placeholder="Tu teléfono" required class="input-focus w-full border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div class="space-y-2">
                        <label for="fechaNacimiento" class="flex items-center text-sm font-medium text-gray-700">
                            <span class="material-icons text-blue-500 mr-2 text-sm">calendar_today</span>
                            Fecha de Nacimiento
                        </label>
                        <input type="date" id="fechaNacimiento" required class="input-focus w-full border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                </div>

                <!-- Fila Provincia y Municipio -->
                <div class="field-row">
                    <div class="space-y-2">
                        <label for="provincia" class="flex items-center text-sm font-medium text-gray-700">
                            <span class="material-icons text-blue-500 mr-2 text-sm">map</span>
                            Provincia
                        </label>
                        <select id="provincia" class="input-focus w-full border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <option value="">Selecciona una provincia</option>
                        </select>
                    </div>
                    <div class="space-y-2">
                        <label for="municipio" class="flex items-center text-sm font-medium text-gray-700">
                            <span class="material-icons text-blue-500 mr-2 text-sm">location_city</span>
                            Municipio
                        </label>
                        <select id="municipio" class="input-focus w-full border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500" disabled>
                            <option value="">Selecciona un municipio</option>
                        </select>
                    </div>
                </div>

                <!-- Fila Dirección y Número -->
                <div class="field-row">
                    <div class="space-y-2">
                        <label for="direccion" class="flex items-center text-sm font-medium text-gray-700">
                            <span class="material-icons text-blue-500 mr-2 text-sm">home</span>
                            Dirección
                        </label>
                        <input type="text" id="direccion" placeholder="Tu dirección" required class="input-focus w-full border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div class="space-y-2">
                        <label for="numero" class="flex items-center text-sm font-medium text-gray-700">
                            <span class="material-icons text-blue-500 mr-2 text-sm">house</span>
                            Número
                        </label>
                        <input type="text" id="numero" placeholder="Número" required class="input-focus w-full border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                </div>

                <!-- Fila Contraseña y Repetir Contraseña (opcional para modificación) -->
                <div class="field-row">
                    <div class="space-y-2">
                        <label for="password" class="flex items-center text-sm font-medium text-gray-700">
                            <span class="material-icons text-blue-500 mr-2 text-sm">lock</span>
                            Contraseña (opcional)
                        </label>
                        <input type="password" id="password" placeholder="Tu contraseña" class="input-focus w-full border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div class="space-y-2">
                        <label for="confirmPassword" class="flex items-center text-sm font-medium text-gray-700">
                            <span class="material-icons text-blue-500 mr-2 text-sm">lock</span>
                            Repetir Contraseña (opcional)
                        </label>
                        <input type="password" id="confirmPassword" placeholder="Repite tu contraseña" class="input-focus w-full border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                </div>

                <button type="submit" class="pulse-shadow w-full bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-700 hover:to-purple-700 text-white py-4 rounded-xl font-semibold transition-all duration-300">
                    <span class="material-icons">person_add</span>
                    <span id="submitButtonText">Modificar</span>
                </button>

                <div class="mt-6 text-center">
                    <p class="text-sm text-gray-600">
                        ¿Ya tienes cuenta?
                        <a href="index.html" class="text-blue-600 hover:text-blue-700 font-medium transition-colors">Inicia sesión aquí</a>
                    </p>
                </div>
            </form>
        </div>

        <div class="mt-8 text-center">
            <div class="flex items-center justify-center space-x-4 text-sm text-blue-100">
                <div class="flex items-center">
                    <span class="material-icons text-sm mr-1">shield</span>
                    <span>Seguro</span>
                </div>
                <div class="flex items-center">
                    <span class="material-icons text-sm mr-1">speed</span>
                    <span>Rápido</span>
                </div>
                <div class="flex items-center">
                    <span class="material-icons text-sm mr-1">support_agent</span>
                    <span>Soporte 24/7</span>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="./js/registrar.js"></script>
<script src="./js/auth.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const userForm = document.getElementById('userForm');
        const provinciaSelect = document.getElementById("provincia");
        const municipioSelect = document.getElementById("municipio");

        // Función para cargar datos del usuario
        async function cargarDatosUsuario() {
            const urlParams = new URLSearchParams(window.location.search);
            const userId = urlParams.get('id'); // Obtener el ID del usuario de la URL

            if (userId) {
                try {
                    const response = await fetch(`http://localhost:8080/api/usuario/${userId}`);
                    if (!response.ok) throw new Error('Error al cargar los datos del usuario');

                    const usuario = await response.json();
                    llenarFormulario(usuario); // Llenar el formulario con los datos del usuario
                } catch (error) {
                    console.error(error);
                    Swal.fire('Error', 'No se pudieron cargar los datos del usuario.', 'error');
                }
            }
        }

        // Función para llenar el formulario con los datos del usuario
        function llenarFormulario(usuario) {
            document.getElementById('userId').value = usuario.id; // Asigna el ID al campo oculto
            document.getElementById('nombre').value = usuario.nombre;
            document.getElementById('apellido').value = usuario.apellido;
            document.getElementById('email').value = usuario.email;
            document.getElementById('dni').value = usuario.dni;
            document.getElementById('telefono').value = usuario.telefono;
            document.getElementById('fechaNacimiento').value = usuario.fechaNacimiento;

            // Asignar valores a provincia y municipio si están disponibles
            document.getElementById('provincia').value = usuario.provincia.id; // Asume que provincia es un objeto con un ID
            cargarMunicipios(usuario.provincia.id); // Cargar municipios basados en la provincia
            document.getElementById('municipio').value = usuario.ciudad.id; // Asume que ciudad es un objeto con un ID
            document.getElementById('direccion').value = usuario.direccion;
            document.getElementById('numero').value = usuario.numero;
        }

        // Verifica que el formulario exista
        if (userForm) {
            userForm.addEventListener('submit', function(event) {
                event.preventDefault(); // Evita que el formulario se envíe de la manera tradicional

                // Obtén el ID del usuario
                const userId = document.getElementById('userId').value;

                // Obtén los valores de los campos
                const nombre = document.getElementById('nombre').value;
                const apellido = document.getElementById('apellido').value;
                const email = document.getElementById('email').value;
                const dni = document.getElementById('dni').value;
                const telefono = document.getElementById('telefono').value;
                const fechaNacimiento = document.getElementById('fechaNacimiento').value;
                const direccion = document.getElementById('direccion').value;
                const numero = document.getElementById('numero').value;
                const password = document.getElementById('password').value;

                // Validar campos
                if (!nombre || !apellido || !email || !dni || !telefono || !fechaNacimiento || !direccion || !numero) {
                    Swal.fire({
                        icon: 'error',
                        title: 'Error',
                        text: 'Todos los campos son obligatorios.',
                    });
                    return; // Evita enviar la solicitud si hay campos vacíos
                }

                // Crea el objeto de datos que se enviará
                const userData = {
                    nombre: nombre,
                    apellido: apellido,
                    email: email,
                    dni: dni,
                    telefono: telefono,
                    fechaNacimiento: fechaNacimiento,
                    provincia: provinciaSelect.value, // Usar el ID de la provincia
                    ciudad: municipioSelect.value, // Usar el ID del municipio
                    direccion: `${direccion} ${numero}`, // Combinar dirección y número
                    password: password ? password : undefined // Incluir la contraseña solo si se proporciona
                };

                // Realiza la solicitud al backend para modificar el usuario
                fetch(`http://localhost:8080/api/usuario/modificar/${userId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(userData)
                })
                .then(response => {
                    if (!response.ok) {
                        return response.json().then(err => { throw new Error(err.message || 'Error en la conexión con el servidor'); });
                    }
                    return response.json();
                })
                .then(data => {
                    // Muestra un mensaje de éxito
                    Swal.fire({
                        icon: 'success',
                        title: 'Modificación exitosa',
                        text: '¡Datos del usuario modificados!',
                    }).then(() => {
                        window.location.href = 'index.html'; // Redirigir a la página de inicio
                    });
                })
                .catch(error => {
                    console.error('Error en la solicitud:', error);
                    Swal.fire({
                        icon: 'error',
                        title: 'Oops...',
                        text: error.message || 'Error desconocido.',
                    });
                });
            });
        } else {
            console.error('El formulario no se encontró. Verifica el ID.');
        }

        // Función para cargar provincias
        function cargarProvincias() {
            fetch('http://localhost:8080/api/provincias')
                .then(response => response.json())
                .then(data => {
                    data.forEach(provincia => {
                                                const option = document.createElement("option");
                        option.value = provincia.id; // ID se mantiene para la selección
                        option.textContent = provincia.nombre; // Nombre se muestra en el select
                        provinciaSelect.appendChild(option);
                    });
                })
                .catch(error => console.error('Error al cargar provincias:', error));
        }

        // Función para cargar municipios según la provincia seleccionada
        function cargarMunicipios(provinciaId) {
            municipioSelect.innerHTML = '<option value="">Selecciona un municipio</option>'; // Resetear municipios
            municipioSelect.disabled = true; // Deshabilitar el select de municipios

            if (provinciaId) {
                fetch(`http://localhost:8080/api/municipios?provincia=${provinciaId}`)
                    .then(response => response.json())
                    .then(data => {
                        data.forEach(municipio => {
                            const option = document.createElement("option");
                            option.value = municipio.id; // ID se mantiene para la selección
                            option.textContent = municipio.nombre; // Nombre se muestra en el select
                            municipioSelect.appendChild(option);
                        });
                        municipioSelect.disabled = false; // Habilitar el select de municipios
                    })
                    .catch(error => console.error('Error al cargar municipios:', error));
            }
        }

        // Cargar provincias al iniciar
        cargarProvincias();

        // Evento para cargar municipios cuando se selecciona una provincia
        provinciaSelect.addEventListener("change", function() {
            const provinciaId = this.value;
            cargarMunicipios(provinciaId);
        });

        // Llamar a la función para cargar datos del usuario
        cargarDatosUsuario();
    });
</script>

</body>
</html>
