 <!DOCTYPE html>
<html lang="es">
<!-- head.html -->
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="AlkyWallet - tu billetera digital con carga, pagos, transferencias y control total." />
  <meta name="keywords" content="billetera virtual, pagos, transferencias, finanzas personales, AlkyWallet" />
  <meta name="author" content="Pingüinos Tecnologícos" />
  <meta property="og:title" content="AlkyWallet" />
  <meta property="og:description" content="Gestioná tu dinero de forma fácil y segura con AlkyWallet." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="http://localhost:8080" />
  <meta property="og:image" content="/assets/logo.png" />
    <title>Tarjetas - AlkyWallet</title>


    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- Material Icons -->
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />

    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: "Inter", sans-serif;
      }

      .glass-effect {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.2);
      }

      .floating-animation {
        animation: float 6s ease-in-out infinite;
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0px);
        }
        50% {
          transform: translateY(-5px);
        }
      }

      .slide-in {
        animation: slideIn 0.5s ease-out;
      }

      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .nav-item {
        position: relative;
        transition: all 0.3s ease;
      }

      .nav-item:after {
        content: "";
        position: absolute;
        width: 0;
        height: 2px;
        bottom: -4px;
        left: 50%;
        background: linear-gradient(90deg, #667eea, #764ba2);
        transition: all 0.3s ease;
        transform: translateX(-50%);
      }

      .nav-item:hover:after {
        width: 100%;
      }

      @keyframes shimmer {
        0%,
        100% {
          transform: rotate(0deg);
        }
        50% {
          transform: rotate(180deg);
        }
      }

      .action-btn {
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
      }

      .action-btn:before {
        content: "";
        position: absolute;
        top: 50%;
        left: 50%;
        width: 0;
        height: 0;
        background: rgba(255, 255, 255, 0.2);
        border-radius: 50%;
        transform: translate(-50%, -50%);
        transition: all 0.5s ease;
      }

      .action-btn:hover:before {
        width: 300px;
        height: 300px;
      }

      .filter-btn {
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
      }

      .filter-btn.active {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        transform: scale(1.05);
      }
    </style>
  </head>
  <body class="gradient-bg text-gray-800 min-h-screen">
    <!-- Header Placeholder -->
  <div id="header-placeholder" class="mb-4"></div>


    <!-- Contenido principal -->
    <main class="container mx-auto p-4 lg:p-6">
      <!-- Filtros y búsqueda -->
      <section class="mb-6 slide-in">
        <div class="glass-effect rounded-2xl p-6">
          <div class="flex flex-col lg:flex-row gap-4">
            <!-- Filtros por tipo -->
            <div class="flex flex-wrap gap-2">
              <button
                onclick="filtrarTarjetas('all')"
                class="filter-btn active px-4 py-2 rounded-xl bg-gray-100 text-gray-700 text-sm font-medium"
                id="filter-all"
              >
                <span class="material-icons text-sm mr-1">view_list</span>
                Todas
              </button>
              <button
                onclick="filtrarTarjetas('debito')"
                class="filter-btn px-4 py-2 rounded-xl bg-gray-100 text-gray-700 text-sm font-medium"
                id="filter-debito"
              >
                <!--   id="filter-income" -->
                <span class="material-icons text-sm mr-1"
                  >account_balance_wallet</span
                >
                Debito
              </button>
              <button
                onclick="filtrarTarjetas('credito')"
                class="filter-btn px-4 py-2 rounded-xl bg-gray-100 text-gray-700 text-sm font-medium"
                id="filter-credito"
              >
                <!--   id="filter-expense" -->
                <span class="material-icons text-sm mr-1">credit_card</span>
                Credito
              </button>
              <button
                onclick="filtrarTarjetas('prepaga')"
                class="filter-btn px-4 py-2 rounded-xl bg-gray-100 text-gray-700 text-sm font-medium"
                id="filter-prepaga"
              >
                <!--   id="filter-transfer" -->
                <span class="material-icons text-sm mr-1">wallet</span>
                Prepaga
              </button>
            </div>
          </div>
        </div>
      </section>
      <!-- Últimos movimientos -->
      <section class="slide-in">
        <div class="glass-effect rounded-2xl p-6">
          <div class="flex items-center justify-between mb-6">
            <h3 class="text-xl font-bold text-gray-800 flex items-center">
              <span class="material-icons mr-2 text-blue-600">
                credit_card
              </span>
              Mis Tarjetas
            </h3>

            <h3
              class="text-xl font-bold text-gray-800 flex items-center bg-color-red"
              style="cursor: pointer"
              onclick="solicitarTarjeta()"
            >
              <span class="material-icons mr-2 text-blue-600">add_card</span>
              Solicitar nueva tarjeta
            </h3>
          </div>

          <div id="ultimosMovimientos" class="space-y-3">
            <!-- Este div será el contenedor padre donde se agregarán todas las tarjetas -->
            <div id="contenedor-tarjetas" class="space-y-3"></div>
          </div>
        </div>
      </section>
    </main>

    <!-- Footer Placeholder -->
  <div id="footer-placeholder" class="mt-8"></div>


    <!-- Script para funcionalidad básica -->
     <script src="js/header.js"></script>
     <script src="js/loader.js"></script>

    <script src="./js/tarjetas.js"></script>
  </body>
</html>
