 <!DOCTYPE html>
<html lang="es">
  <!-- head.html -->
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description"
      content="AlkyWallet - tu billetera digital con carga, pagos, transferencias y control total." />
    <meta name="keywords"
      content="billetera virtual, pagos, transferencias, finanzas personales, AlkyWallet" />
    <meta name="author" content="Pingüinos Tecnologícos" />
    <meta property="og:title" content="AlkyWallet" />
    <meta property="og:description"
      content="Gestioná tu dinero de forma fácil y segura con AlkyWallet." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="http://localhost:8080" />
    <meta property="og:image" content="/assets/logo.png" />
    <title>Registrar Pago - AlkyWallet</title>

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet">

    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .gradient-bg {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }

        .glass-effect {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .floating-animation {
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-5px); }
        }

        .slide-in {
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .amount-card {
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .amount-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        .amount-card.selected {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            transform: scale(1.05);
        }

        .payment-method {
            transition: all 0.3s ease;
            cursor: pointer;
            border: 2px solid transparent;
        }

        .payment-method:hover {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.05);
        }

        .payment-method.selected {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.1);
        }

        .input-focus {
            transition: all 0.3s ease;
        }

        .input-focus:focus {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }

        .nav-item {
            position: relative;
            transition: all 0.3s ease;
        }

        .nav-item:after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -4px;
            left: 50%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: all 0.3s ease;
            transform: translateX(-50%);
        }

        .nav-item:hover:after {
            width: 100%;
        }

        .progress-step {
            transition: all 0.3s ease;
        }

        .progress-step.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .progress-step.completed {
            background: #10b981;
            color: white;
        }
    </style>
  </head>

  <body class="gradient-bg min-h-screen flex flex-col">
    <!-- Header Placeholder -->
    <div id="header-placeholder" class="mb-4"></div>

    <!-- Indicador de progreso -->
    <div class="container mx-auto px-4 py-4">
      <div class="flex items-center justify-center space-x-4">
        <div
          class="progress-step active w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold">
          1
        </div>
        <div class="w-12 h-1 bg-gray-300 rounded"></div>
        <div
          class="progress-step w-8 h-8 rounded-full bg-gray-300 flex items-center justify-center text-sm font-bold text-gray-500">
          2
        </div>
        <div class="w-12 h-1 bg-gray-300 rounded"></div>
        <div
          class="progress-step w-8 h-8 rounded-full bg-gray-300 flex items-center justify-center text-sm font-bold text-gray-500">
          3
        </div>
      </div>

      <div
        class="grid grid-cols-3 gap-4 text-center mt-2 text-xs text-gray-600 max-w-md mx-auto">
        <span>Comercio</span>
        <span>Monto</span>
        <span>Confirmación</span>
      </div>

      <!-- Contenido principal -->
      <main class="flex-1 container mx-auto px-4 py-8">
        <div class="max-w-2xl mx-auto">
          <!-- Saldo actual -->
          <div class="glass-effect rounded-2xl p-6 mb-8 slide-in">
            <div class="flex items-center justify-between">
              <div>
                <p class="text-sm text-gray-600 mb-1">Saldo
                  actual</p>
                <p class="text-3xl font-bold text-gray-800">$<span
                    id="saldoActual">125.750,50</span></p>
              </div>
              <div
                class="w-16 h-16 bg-gradient-to-r from-blue-500 to-purple-600 rounded-2xl flex items-center justify-center">
                <span
                  class="material-icons text-white text-2xl">account_balance</span>
              </div>
            </div>
          </div>

          <!-- Contenido -->
          <main class="flex-1 container mx-auto px-4 py-8">
            <div class="max-w-2xl mx-auto">
              <div class="glass-effect rounded-3xl p-8 slide-in">
                <div class="text-center mb-8">
                  <div
                    class="w-20 h-20 bg-gradient-to-r from-purple-500 to-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-4 floating-animation">
                    <span
                      class="material-icons text-white text-3xl">payments</span>
                  </div>
                  <h2
                    class="text-2xl font-bold text-gray-800 mb-2">Registrar
                    pago</h2>
                  <p class="text-gray-600">Completá los datos del comercio
                    al que realizaste un pago</p>
                </div>

                <form id="pagoForm" class="space-y-6">
                  <!-- Comercio -->
                  <div>
                    <label for="comercio"
                      class="block text-sm font-medium text-gray-700 mb-1">Nombre
                      del comercio</label>
                    <input type="text" id="comercio" required
                      class="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none">
                  </div>

                  <!-- Monto -->
                  <div>
                    <label for="monto"
                      class="block text-sm font-medium text-gray-700 mb-1">Monto
                      del pago</label>
                    <input type="number" id="monto" required min="1"
                      class="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none">
                  </div>

                  <!-- Cuenta -->
                  <div>
                    <label for="cuentaId"
                      class="block text-sm font-medium text-gray-700 mb-1">Seleccionar
                      cuenta</label>
                    <select id="cuentaId" required
                      class="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none">
                      <option value>Selecciona una cuenta</option>
                      <!-- Opciones se cargan por JS -->
                    </select>
                  </div>

                  <button type="submit"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-xl font-semibold transition-all">
                    Confirmar pago
                  </button>
                </form>
              </div>
            </div>
          </main>

          <!-- Footer Placeholder -->
          <div id="footer-placeholder" class="mt-8"></div>
          <!-- Script para funcionalidad básica -->
          <script src="./js/header.js"></script>
          <script src="./js/loader.js"></script>

          <script src="./js/pago.js"></script>
        </body>
      </html>
