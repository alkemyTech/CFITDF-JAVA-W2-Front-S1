<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>AlkyWallet - Recuperar Contraseña</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- SweetAlert2 CDN -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
          font-family: 'Inter', sans-serif;
        }

        .gradient-bg {
          background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .glass-effect {
          background: rgba(255, 255, 255, 0.95);
          backdrop-filter: blur(20px);
          border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .input-focus {
          transition: all 0.3s ease;
        }

        .input-focus:focus {
          transform: translateY(-2px);
          box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body class="gradient-bg min-h-screen flex flex-col">
<!-- Header -->
<header class="glass-effect shadow-lg border-b border-white/20">
    <div class="container mx-auto px-4 py-4">
        <div class="flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <div class="bg-gradient-to-r from-blue-500 to-purple-600 p-2 rounded-xl">
                    <span class="material-icons text-white text-2xl">account_balance_wallet</span>
                </div>
                <div>
                    <h1 class="text-xl font-bold bg-gradient-to-r from-blue-600 to-purple-600 bg-clip-text text-transparent">
                        AlkyWallet
                    </h1>
                    <p class="text-xs text-gray-600">Tu billetera digital</p>
                </div>
            </div>
        </div>
    </div>
</header>

<!-- Main Content -->
<main class="flex-1 flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <!-- Decoración superior -->
        <div class="text-center mb-8">
            <h2 class="text-3xl font-bold text-white mt-4 mb-2">Recuperar Contraseña</h2>
            <p class="text-blue-100">Ingresa tu correo electrónico para recuperar tu contraseña</p>
        </div>

        <!-- Formulario de Recuperación -->
        <div class="glass-effect rounded-3xl p-8 shadow-2xl">
            <form id="recuperarContrasenaForm" class="space-y-6">
                <!-- Campo Email -->
                <div class="space-y-2">
                    <label for="email" class="flex items-center text-sm font-medium text-gray-700">
                        <span class="material-icons text-blue-500 mr-2 text-sm">email</span>
                        Correo electrónico
                    </label>
                    <input
                        type="email"
                        id="email"
                        placeholder="ejemplo@mail.com"
                        required
                        class="input-focus w-full p-4 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all duration-300"
                    >
                </div>

                <!-- Botón de Recuperación -->
                <button
                    type="submit"
                    class="w-full bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-700 hover:to-purple-700 text-white py-4 rounded-xl font-semibold transition-all duration-300 transform hover:scale-105 flex items-center justify-center space-x-2"
                >
                    <span class="material-icons">send</span>
                    <span>Enviar enlace de recuperación</span>
                </button>
            </form>

            <!-- Mensaje de estado -->
            <div id="mensaje" class="mt-4 text-center text-gray-600 hidden"></div>

            <!-- Link de regreso -->
            <div class="mt-6 text-center">
                <p class="text-sm text-gray-600">
                    ¿Ya tienes tu contraseña?
                    <a href="login.html" class="text-blue-600 hover:text-blue-700 font-medium transition-colors">
                        Inicia sesión aquí
                    </a>
                </p>
            </div>
        </div>
    </div>
</main>

<script>
    document.getElementById('recuperarContrasenaForm').addEventListener('submit', async function(event) {
        event.preventDefault(); // Evitar el envío del formulario

        const email = document.getElementById('email').value;

        try {
            const response = await fetch('http://localhost:8080/api/recuperar-contrasena', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ email })
            });

            if (!response.ok) {
                throw new Error('Error al enviar el enlace de recuperación');
            }

            // Mostrar mensaje de éxito con SweetAlert
            await Swal.fire({
                title: 'Éxito!',
                text: 'Se ha enviado un enlace de recuperación a tu correo electrónico.',
                icon: 'success',
                confirmButtonText: 'Aceptar'
            });

            // Redirigir al usuario al login
            window.location.href = 'index.html';
        } catch (error) {
            // Mostrar mensaje de error con SweetAlert
            await Swal.fire({
                title: 'Error!',
                text: error.message,
                icon: 'error',
                confirmButtonText: 'Aceptar'
            });
        }
    });
</script>

</body>
</html>
