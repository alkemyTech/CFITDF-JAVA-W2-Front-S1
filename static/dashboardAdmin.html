<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - AlkyWallet Administrador</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .gradient-bg {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }

        .glass-effect {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body class="gradient-bg text-gray-800 min-h-screen">

    <!-- Header -->
    <header class="glass-effect shadow-lg border-b border-white/20 sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4">
            <div class="flex flex-col lg:flex-row lg:items-center lg:justify-between gap-4">
                <div class="flex items-center space-x-3">
                    <div class="bg-gradient-to-r from-blue-500 to-purple-600 p-2 rounded-xl">
                        <span class="material-icons text-white text-2xl">admin_panel_settings</span>
                    </div>
                    <div>
                        <h1 class="text-xl font-bold bg-gradient-to-r from-blue-600 to-purple-600 bg-clip-text text-transparent">
                            AlkyWallet Admin
                        </h1>
                        <p class="text-xs text-gray-600">Dashboard Administrador</p>
                    </div>
                </div>

                <nav class="flex flex-wrap gap-1 lg:gap-4">
                    <a href="dashboardAdmin.html" class="nav-item px-3 py-2 text-sm font-medium text-blue-600 rounded-lg bg-blue-50">
                        <span class="material-icons text-sm mr-1">dashboard</span>
                        Inicio
                    </a>
                    <a href="usuarios.html" class="nav-item px-3 py-2 text-sm font-medium text-gray-700 hover:text-blue-600 hover:bg-blue-50 rounded-lg">
                        <span class="material-icons text-sm mr-1">people</span>
                        Usuarios
                    </a>
                    <button onclick="logout()" class="nav-item px-3 py-2 text-sm font-medium text-red-600 hover:text-red-700 hover:bg-red-50 rounded-lg ml-2">
                        <span class="material-icons text-sm mr-1">logout</span>
                        Salir
                    </button>
                </nav>
            </div>
        </div>
    </header>

    <!-- Contenido principal -->
    <main class="container mx-auto p-4 lg:p-6">
        <div id="currentTime" class="text-gray-600 mb-4"></div> <!-- Elemento para mostrar la hora actual -->

        <!-- Sección de estadísticas -->
        <section class="mb-8">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="glass-effect rounded-2xl p-6">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-sm text-gray-600 mb-1">Total Usuarios</p>
                            <p class="text-2xl font-bold text-blue-600"><span id="totalUsuarios">0</span></p>
                        </div>
                        <div class="w-12 h-12 bg-blue-100 rounded-xl flex items-center justify-center">
                            <span class="material-icons text-blue-600">people</span>
                        </div>
                    </div>
                </div>

                <div class="glass-effect rounded-2xl p-6">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-sm text-gray-600 mb-1">Transacciones del mes</p>
                            <p class="text-2xl font-bold text-green-600">$<span id="transaccionesMes">0.00</span></p>
                        </div>
                        <div class="w-12 h-12 bg-green-100 rounded-xl flex items-center justify-center">
                            <span class="material-icons text-green-600">trending_up</span>
                        </div>
                    </div>
                </div>

                <div class="glass-effect rounded-2xl p-6">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-sm text-gray-600 mb-1">Ingresos del mes</p>
                            <p class="text-2xl font-bold text-green-600">$<span id="ingresosMes">0.00</span></p>
                        </div>
                        <div class="w-12 h-12 bg-green-100 rounded-xl flex items-center justify-center">
                            <span class="material-icons text-green-600">attach_money</span>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Últimos usuarios registrados -->
        <section>
            <div class="glass-effect rounded-2xl p-6">
                <div class="flex items-center justify-between mb-6">
                    <h3 class="text-xl font-bold text-gray-800 flex items-center">
                        <span class="material-icons mr-2 text-blue-600">history</span>
                        Últimos Usuarios Registrados
                    </h3>
                    <a href="usuarios.html" class="text-blue-600 hover:text-blue-700 text-sm font-medium flex items-center">
                        Ver todos
                        <span class="material-icons text-sm ml-1">arrow_forward</span>
                    </a>
                </div>

                <div id="ultimosUsuarios" class="space-y-3">
                    <!-- Ejemplo de usuarios (se reemplazarán con JS) -->
                </div>
            </div>
        </section>
    </main>

    <script src="./js/dashboardAdmin.js"></script>
    <script>
        function updateCurrentTime() {
            const now = new Date();
            const timeString = now.toLocaleTimeString('es-AR', {
                hour: '2-digit',
                minute: '2-digit'
            });
            const currentTimeElement = document.getElementById('currentTime');
            if (currentTimeElement) {
                currentTimeElement.textContent = `Hora actual: ${timeString}`;
            } else {
                console.error('Elemento currentTime no encontrado');
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            updateCurrentTime();
            setInterval(updateCurrentTime, 1000); // Actualiza la hora cada segundo
            mostrarUltimosUsuarios(); // Llama a la función para mostrar los últimos usuarios
        });

        async function mostrarUltimosUsuarios() {
            const ultimosUsuariosDiv = document.getElementById("ultimosUsuarios");
            const totalUsuariosElement = document.getElementById("totalUsuarios");
            ultimosUsuariosDiv.innerHTML = ""; // Limpiar contenido previo

            try {
                const response = await fetch('http://localhost:8080/api/usuario/listado');
                if (!response.ok) {
                    throw new Error('Error en la solicitud: ' + response.statusText);
                }

                const usuarios = await response.json();
                
                // Actualiza el total de usuarios
                totalUsuariosElement.textContent = usuarios.length;

                const ultimosUsuarios = usuarios.slice(0, 4); // Obtener los últimos 4 usuarios

                ultimosUsuarios.forEach(usuario => {
                    const usuarioDiv = document.createElement("div");
                    usuarioDiv.className = "flex items-center justify-between p-4 rounded-xl hover:bg-gray-50 transition-all duration-300";
                    usuarioDiv.innerHTML = `
                        <div class="flex items-center space-x-4">
                            <div class="w-12 h-12 bg-blue-100 rounded-xl flex items-center justify-center">
                                <span class="material-icons text-blue-600">person</span>
                            </div>
                            <div>
                                <p class="font-medium text-gray-800">${usuario.nombre} ${usuario.apellido}</p>
                                <p class="text-sm text-gray-500">Registrado: ${new Date(usuario.fechaRegistro).toLocaleDateString('es-AR', { year: 'numeric', month: 'long', day: 'numeric' })}</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="font-bold text-gray-800">${usuario.enabled ? 'Activo' : 'Inactivo'}</p>
                        </div>
                    `;
                    ultimosUsuariosDiv.appendChild(usuarioDiv);
                });
            } catch (error) {
                console.error('Error al cargar los usuarios:', error);
            }
        }
    </script>
</body>
</html>
